<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content="kiwwij">
    <title>kiwwij Notes</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📝</text></svg>">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <link rel="stylesheet" href="../css/my-notes.css">
    <script type="module" src="https://cdn.jsdelivr.net/npm/emoji-picker-element@1/index.js"></script>
</head>
<body>
    <div class="app-container">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="icon-text">
                    <i class='bx bx-notepad'></i>
                    <h2 data-i18n="app_title">kiwwij Notes</h2>
                </div>
                <button id="close-sidebar-btn" class="btn-icon mobile-only"><i class='bx bx-x'></i></button>
            </div>
            
            <div class="sidebar-actions">
                <button id="new-folder-btn" class="btn-secondary"><i class='bx bx-folder-plus'></i> <span data-i18n="folder">Папка</span></button>
                <button id="new-note-btn" class="btn-primary"><i class='bx bx-plus'></i> <span data-i18n="note">Запись</span></button>
            </div>

            <div class="sidebar-scroll-area">
                <div id="root-zone" class="root-zone">
                    <div class="root-zone-title" id="root-drop-zone">
                        <span><i class='bx bx-layer'></i> <span data-i18n="out_of_folders">Вне папок</span></span>
                    </div>
                    <ul id="root-notes-list" class="notes-list"></ul>
                </div>

                <div id="folders-container" class="folders-container"></div>
            </div>
            
            <div class="backup-actions">
                <button id="export-btn" class="btn-secondary"><i class='bx bx-download'></i> <span data-i18n="export">Скачать .json</span></button>
                <input type="file" id="import-input" accept=".json, .js" class="hidden">
                <input type="file" id="local-image-input" accept="image/*" class="hidden">
                <button id="import-btn" class="btn-secondary"><i class='bx bx-upload'></i> <span data-i18n="import">Загрузить</span></button>
            </div>
        </aside>

        <div id="sidebar-overlay" class="sidebar-overlay hidden"></div>

        <main class="editor-area">
            <header class="editor-header">
                <div class="mobile-header-left">
                    <button id="mobile-menu-btn" class="btn-icon mobile-only"><i class='bx bx-menu'></i></button>
                    <input type="text" id="note-title" data-i18n-ph="ph_note_title" placeholder="Название записи..." class="title-input">
                </div>
                <div class="header-actions">
                    <select id="lang-select" class="lang-selector">
                        <option value="ru">RU</option>
                        <option value="ua">UA</option>
                        <option value="en">EN</option>
                    </select>
                    <button id="theme-toggle" class="btn-icon" data-i18n-title="theme_tt" title="Сменить тему"><i class='bx bx-sun'></i></button>
                    <button id="share-note-btn" class="btn-secondary" data-i18n-title="share_tt" title="Поделиться ссылкой"><i class='bx bx-share-alt'></i></button>
                    <button id="save-local-btn" class="btn-secondary" data-i18n-title="save_tt" title="Сохранить локально"><i class='bx bx-save'></i></button>
                    <button id="sync-github-down-btn" class="btn-secondary" data-i18n-title="down_tt" title="Скачать из облака"><i class='bx bx-cloud-download'></i></button>
                    <button id="sync-github-up-btn" class="btn-accent" data-i18n-title="up_tt" title="Сохранить в облако"><i class='bx bx-cloud-upload'></i></button>
                </div>
            </header>

            <div class="toolbar">
                <button class="format-btn" data-command="bold" data-i18n-title="bold_tt" title="Жирный"><i class='bx bx-bold'></i></button>
                <button class="format-btn" data-command="italic" data-i18n-title="italic_tt" title="Курсив"><i class='bx bx-italic'></i></button>
                <button class="format-btn" data-command="underline" data-i18n-title="under_tt" title="Подчеркнутый"><i class='bx bx-underline'></i></button>
                <button class="format-btn" id="spoiler-btn" data-i18n-title="spoiler_tt" title="Спойлер текста"><i class='bx bx-hide'></i></button>
                <button class="format-btn" id="image-btn" data-i18n-title="img_add_tt" title="Вставить картинку по ссылке"><i class='bx bx-link'></i></button>
                <button class="format-btn" id="local-image-btn" data-i18n-title="img_upload_tt" title="Загрузить картинку с ПК"><i class='bx bx-image-add'></i></button>
                <div class="divider"></div>
                <button class="format-btn" data-command="insertOrderedList" data-i18n-title="ol_tt" title="Нумерованный список"><i class='bx bx-list-ol'></i></button>
                <button class="format-btn" data-command="insertUnorderedList" data-i18n-title="ul_tt" title="Маркированный список"><i class='bx bx-list-ul'></i></button>
                <div class="divider"></div>
                <button class="format-btn" data-command="justifyLeft" data-i18n-title="left_tt" title="По левому краю"><i class='bx bx-align-left'></i></button>
                <button class="format-btn" data-command="justifyCenter" data-i18n-title="center_tt" title="По центру"><i class='bx bx-align-middle'></i></button>
                <button class="format-btn" data-command="justifyRight" data-i18n-title="right_tt" title="По правому краю"><i class='bx bx-align-right'></i></button>
                <button class="format-btn" data-command="justifyFull" data-i18n-title="full_tt" title="По ширине"><i class='bx bx-align-justify'></i></button>
                <div class="divider"></div>
                
                <input type="color" id="text-color" class="color-picker" data-i18n-title="color_tt" title="Цвет текста">
                <button class="format-btn" data-command="removeFormat" data-i18n-title="clear_tt" title="Сбросить"><i class='bx bx-eraser'></i></button>
                <div class="divider"></div>
                
                <div class="emoji-wrapper">
                    <button class="format-btn" id="emoji-btn"><i class='bx bx-smile'></i></button>
                    <div id="emoji-popup" class="hidden">
                        <emoji-picker class="dark"></emoji-picker>
                    </div>
                </div>
            </div>

            <div id="image-resizer" class="hidden"></div>
            
            <div id="editor" class="rich-editor" contenteditable="true"></div>
        </main>
    </div>

    <div id="custom-modal" class="modal-overlay hidden">
        <div class="modal-content">
            <h3 id="modal-title" data-i18n="modal_title">Ввод данных</h3>
            <p id="modal-message" class="hidden" style="margin: 1rem 0; color: var(--text-muted);"></p>
            <input type="text" id="modal-input" class="modal-input">
            
            <label id="modal-checkbox-label" class="hidden" style="display: flex; align-items: center; gap: 0.5rem; margin-top: 1rem; color: var(--text-main); cursor: pointer;">
                <input type="checkbox" id="modal-checkbox">
                <span id="modal-checkbox-text">Опция</span>
            </label>

            <div class="modal-actions" style="margin-top: 1.5rem;">
                <button id="modal-cancel" class="btn-secondary" data-i18n="cancel">Отмена</button>
                <button id="modal-confirm" class="btn-primary" data-i18n="ok">Ок</button>
            </div>
        </div>
    </div>

    <div id="toast" class="toast-container hidden">
        <span id="toast-message">Удалено</span>
        <button id="toast-undo-btn" class="btn-accent"><span data-i18n="undo">Отменить</span> (<span id="toast-timer">10</span>)</button>
    </div>

    <script src="../js/my-notes.js"></script>
</body>
</html>
