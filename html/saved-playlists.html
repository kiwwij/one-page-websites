<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content="kiwwij">
    <title data-i18n="pageTitle">Soundtrack Collection</title>
    
    <link rel="icon" href="https://unpkg.com/boxicons@2.1.4/svg/regular/bx-headphone.svg" type="image/svg+xml">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">
    
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    
    <link rel="stylesheet" href="../css/saved-playlists.css">
</head>
<body class="dark">
    <header>
        <h1 data-i18n="headerTitle"><i class='bx bx-music'></i> My saved soundtracks (playlists)</h1>
        <div class="controls">
            <button id="lang-toggle" class="btn">
                <i class='bx bx-globe'></i> <span id="lang-text">EN</span>
            </button>
            <button id="theme-toggle" class="btn">
                <i class='bx bx-moon' id="theme-icon"></i>
            </button>
        </div>
    </header>

    <main>
        <div class="container" id="playlist-container">
            </div>
    </main>

    <script src="../js/saved-playlists.js"></script>
</body>
</html>
